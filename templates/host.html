<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startup Game - Host</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #fce4ec, #e1d5e7, #c5d9f0);
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .card {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15);
        }
        button {
            background: linear-gradient(95deg, #f48fb1, #ba6bff, #5e9bff);
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { transform: scale(0.98); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        input, select { padding: 8px 12px; border-radius: 12px; border: 1px solid #c9b1e6; margin: 0 5px; }
        .link-item { background: rgba(255,255,255,0.7); padding: 12px; border-radius: 16px; margin-bottom: 8px; }
        .logs { background: rgba(0,0,0,0.05); border-radius: 1rem; padding: 12px; max-height: 250px; overflow-y: auto; font-family: monospace; font-size: 13px; }
        .flex { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
        .rank-card { background: white; border-radius: 1rem; padding: 12px; margin-bottom: 8px; border-left: 4px solid #ec4899; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h2>✨ Startup Game - Host Dashboard</h2>
        <div id="connStatus">🔌 Đang kết nối...</div>
    </div>

    <div class="card" id="setupPanel">
        <h2>🎮 Create Room</h2>
        <div class="flex">
            <label>Room name:</label>
            <input type="text" id="roomName" value="Startup Arena">
            <label>Players:</label>
            <input type="number" id="numPlayers" min="2" max="10" value="4">
            <button onclick="createRoom()">🚀 CREATE ROOM</button>
        </div>
    </div>

    <div class="card" id="gamePanel" style="display:none;">
        <div class="flex" style="justify-content: space-between;">
            <h2>🏠 <span id="roomNameDisplay"></span> · ID: <span id="roomId"></span></h2>
            <button onclick="newRoom()">➕ New Room</button>
        </div>

        <div class="card">
            <h3>🔗 Player Links (click Copy gửi cho từng người)</h3>
            <div id="joinLinks"></div>
        </div>

        <div class="card">
            <h3>⏱️ Progress</h3>
            <div class="flex">
                <span>👥 <strong id="joinedCount">0</strong>/<span id="totalPlayers">0</span></span>
                <span>🕒 Phase <strong id="currentPhase">0</strong>/<strong id="maxPhase">0</strong></span>
                <span>🎯 Status: <strong id="gameStatus">-</strong></span>
            </div>
            <div class="flex" style="margin-top: 12px;">
                <button onclick="nextPhase()" id="nextPhaseBtn" disabled>▶ NEXT PHASE</button>
                <button onclick="addRandomEvent()" id="randEventBtn" disabled>🎲 RANDOM EVENT</button>
                <button onclick="resetPhase()" id="resetPhaseBtn" disabled>🔄 RESET PHASE</button>
                <button onclick="endGame()" id="endGameBtn" disabled>⛔ END GAME</button>
                <button onclick="resetGame()" id="resetGameBtn">🔄 RESET GAME</button>
            </div>
        </div>

        <div class="card">
            <h3>📜 Event Log</h3>
            <div id="logs" class="logs">--</div>
        </div>

        <div class="card">
            <h3>🏆 Leaderboard</h3>
            <div id="rankings">--</div>
        </div>
    </div>
</div>

<script>
    const API = window.location.origin + '/api';
    let currentRoom = null;
    let pollInterval = null;

    async function createRoom() {
        const name = document.getElementById('roomName').value;
        const maxPlayers = parseInt(document.getElementById('numPlayers').value);
        const res = await fetch(`${API}/rooms`, {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({name, maxPlayers})
        });
        const data = await res.json();
        currentRoom = data.id;
        sessionStorage.setItem('roomId', currentRoom);
        document.getElementById('setupPanel').style.display = 'none';
        document.getElementById('gamePanel').style.display = 'block';
        document.getElementById('roomId').innerText = currentRoom;
        document.getElementById('roomNameDisplay').innerText = name;
        document.getElementById('totalPlayers').innerText = maxPlayers;
        startPolling();
    }

    function newRoom() {
        if (confirm('Create new room? Current will be lost.')) {
            sessionStorage.removeItem('roomId');
            location.reload();
        }
    }

    async function fetchRoom() {
        if (!currentRoom) return;
        const res = await fetch(`${API}/rooms/${currentRoom}`);
        if (!res.ok) return;
        const data = await res.json();
        updateUI(data);
    }

    function updateUI(room) {
        document.getElementById('joinedCount').innerText = room.joinedPlayers;
        document.getElementById('currentPhase').innerText = room.currentPhase;
        document.getElementById('maxPhase').innerText = room.maxPhase;
        let statusText = '';
        if (room.ended) statusText = '🏁 ENDED';
        else if (room.status === 'waiting_for_projects') statusText = '⏳ Waiting for projects';
        else if (room.status === 'choosing_deck') statusText = '🃏 Choosing decks';
        else statusText = '🔥 IN PROGRESS';
        document.getElementById('gameStatus').innerText = statusText;

        const isPlaying = (room.status === 'playing' && !room.ended);
        document.getElementById('nextPhaseBtn').disabled = !isPlaying;
        document.getElementById('randEventBtn').disabled = !isPlaying;
        document.getElementById('resetPhaseBtn').disabled = !isPlaying;
        document.getElementById('endGameBtn').disabled = room.ended;

        // Join links
        let linksHtml = '';
        room.joinLinks.forEach(link => {
            const joined = room.players.find(p => p.id === link.playerIndex)?.status !== 'not_joined';
            linksHtml += `
                <div class="link-item">
                    <strong>${link.playerName}</strong> ${joined ? '✅ Joined' : '⏳ Waiting'} <br>
                    <input type="text" value="${link.realLink}" style="width: 70%; font-size:12px;" readonly>
                    <button onclick="copyToClipboard('${link.realLink}')">Copy</button>
                </div>
            `;
        });
        document.getElementById('joinLinks').innerHTML = linksHtml;

        // Logs
        if (room.logs && room.logs.length) {
            document.getElementById('logs').innerHTML = room.logs.slice().reverse().map(l => `📌 ${l}`).join('<br>');
        } else {
            document.getElementById('logs').innerHTML = '--';
        }

        // Rankings
        let rankHtml = '';
        room.players.forEach((p, i) => {
            const funding = ((p.funding || 0)*100).toFixed(1);
            rankHtml += `
                <div class="rank-card">
                    <strong>${p.name}</strong> - ${p.status === 'active' ? '🎮 Playing' : (p.status==='ended'?'🏁 Done':'⌛ Waiting')}<br>
                    💰 Funding: ${funding}% &nbsp; 📈 Hype: ${p.hype||0} &nbsp; 🔍 Trans: ${p.transparency||0}
                </div>
            `;
        });
        document.getElementById('rankings').innerHTML = rankHtml || '--';
    }

    async function nextPhase() {
        const res = await fetch(`${API}/rooms/${currentRoom}/next-phase`, {method:'POST'});
        if (!res.ok) alert('Cannot advance phase');
        else fetchRoom();
    }
    async function addRandomEvent() {
        const res = await fetch(`${API}/rooms/${currentRoom}/random-event`, {method:'POST'});
        if (!res.ok) alert('Cannot add event');
        else fetchRoom();
    }
    async function resetPhase() {
        await fetch(`${API}/rooms/${currentRoom}/reset-phase`, {method:'POST'});
        fetchRoom();
    }
    async function endGame() {
        if (confirm('End game now?')) {
            await fetch(`${API}/rooms/${currentRoom}/end`, {method:'POST'});
            fetchRoom();
        }
    }
    async function resetGame() {
        if (confirm('Reset all data?')) {
            await fetch(`${API}/rooms/${currentRoom}/reset`, {method:'POST'});
            fetchRoom();
        }
    }
    function copyToClipboard(text) {
        navigator.clipboard.writeText(text);
        alert('Copied!');
    }

    function startPolling() {
        if (pollInterval) clearInterval(pollInterval);
        fetchRoom();
        pollInterval = setInterval(fetchRoom, 2500);
    }

    const saved = sessionStorage.getItem('roomId');
    if (saved) {
        currentRoom = saved;
        document.getElementById('setupPanel').style.display = 'none';
        document.getElementById('gamePanel').style.display = 'block';
        startPolling();
    }
</script>
</body>
</html>
