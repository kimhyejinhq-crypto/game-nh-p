<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Startup Game - Host</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        .card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        button { background: #6c5ce7; color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; }
        button:disabled { opacity: 0.6; }
        .flex { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
        .rank-card { border-left: 4px solid #6c5ce7; padding: 10px; margin: 8px 0; background: #f9f9ff; }
        .logs { background: #f1f1f1; padding: 10px; height: 200px; overflow-y: auto; font-family: monospace; }
        input, select { padding: 6px 10px; border-radius: 6px; border: 1px solid #ccc; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h2>🎮 Startup Game - Host Dashboard</h2>
        <div id="connStatus" style="color: green;">✅ Đã kết nối backend</div>
    </div>

    <div class="card" id="setupPanel">
        <h3>Tạo phòng mới</h3>
        <div class="flex">
            <input type="text" id="roomName" placeholder="Tên phòng" value="Lớp 12A">
            <input type="number" id="numPlayers" min="2" max="10" value="4">
            <button onclick="createRoom()">🚀 Tạo phòng</button>
        </div>
    </div>

    <div class="card" id="gamePanel" style="display:none;">
        <div class="flex" style="justify-content: space-between;">
            <h3>🏠 Phòng: <span id="roomId"></span> - <span id="roomNameDisplay"></span></h3>
            <button onclick="location.reload()">➕ Tạo phòng mới</button>
        </div>

        <div class="card">
            <h4>🔗 Link tham gia (gửi từng người)</h4>
            <div id="joinLinks"></div>
            <button id="startDeckBtn" onclick="startDeckPhase()" style="margin-top:10px; background:#2ecc71;">▶ BẮT ĐẦU CHỌN DECK</button>
        </div>

        <div class="card">
            <h4>📊 Tiến trình game</h4>
            <div class="flex">
                <span>👥 Đã tham gia: <strong id="joinedCount">0</strong>/<span id="totalPlayers">0</span></span>
                <span>🕒 Phase: <strong id="currentPhase">0</strong>/<strong id="maxPhase">0</strong></span>
                <span>🎯 Trạng thái: <strong id="gameStatus">-</strong></span>
            </div>
            <div class="flex" style="margin-top: 12px;">
                <button onclick="runPhase()" id="runPhaseBtn" disabled>▶ NEXT PHASE</button>
                <button onclick="endGame()" id="endGameBtn" disabled>⛔ KẾT THÚC GAME</button>
            </div>
        </div>

        <div class="card">
            <h4>📜 Nhật ký</h4>
            <div id="logs" class="logs">--</div>
        </div>

        <div class="card">
            <h4>🏆 Bảng xếp hạng</h4>
            <div id="rankings">--</div>
        </div>
    </div>
</div>

<script>
    const API = window.location.origin + '/api';
    let currentRoom = null;
    let pollInterval = null;

    async function createRoom() {
        const name = document.getElementById('roomName').value;
        const num = parseInt(document.getElementById('numPlayers').value);
        const res = await fetch(`${API}/create_room`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ room_name: name, num_players: num })
        });
        const data = await res.json();
        if (data.error) { alert(data.error); return; }
        currentRoom = data.room_id;
        sessionStorage.setItem('roomId', currentRoom);
        // Lưu join links
        window.joinLinks = data.join_links;
        document.getElementById('setupPanel').style.display = 'none';
        document.getElementById('gamePanel').style.display = 'block';
        document.getElementById('roomId').innerText = currentRoom;
        document.getElementById('roomNameDisplay').innerText = name;
        document.getElementById('totalPlayers').innerText = num;
        startPolling();
    }

    async function fetchRoom() {
        if (!currentRoom) return;
        const res = await fetch(`${API}/host_state?room_id=${currentRoom}`);
        if (!res.ok) return;
        const data = await res.json();
        updateUI(data);
    }

    function updateUI(room) {
        document.getElementById('joinedCount').innerText = room.submitted_count || 0;
        document.getElementById('currentPhase').innerText = room.phase;
        document.getElementById('maxPhase').innerText = room.max_phase;
        let statusText = '';
        if (room.game_ended) statusText = '🏁 Đã kết thúc';
        else if (room.status === 'waiting_for_projects') statusText = '⏳ Chờ submit dự án';
        else if (room.status === 'choosing_deck') statusText = '🃏 Đang chọn deck';
        else if (room.status === 'playing') statusText = '🔥 Đang chơi';
        else statusText = room.status;
        document.getElementById('gameStatus').innerText = statusText;

        const isPlaying = (room.status === 'playing' && !room.game_ended);
        document.getElementById('runPhaseBtn').disabled = !isPlaying;
        document.getElementById('endGameBtn').disabled = room.game_ended;

        // Hiển thị link tham gia
        if (window.joinLinks) {
            let html = '';
            window.joinLinks.forEach((link, idx) => {
                let joined = (room.rankings[idx] && room.rankings[idx].status !== 'not_joined');
                html += `<div style="margin-bottom:8px;"><strong>Player ${idx+1}</strong> ${joined ? '✅ Đã vào' : '⏳ Chờ'}
                        <input type="text" value="${link}" style="width:60%" readonly> 
                        <button onclick="navigator.clipboard.writeText('${link}')">Copy</button></div>`;
            });
            document.getElementById('joinLinks').innerHTML = html;
        }

        // Logs
        if (room.logs && room.logs.length) {
            document.getElementById('logs').innerHTML = [...room.logs].reverse().map(l => `📌 ${l}`).join('<br>');
        }

        // Rankings
        let rankHtml = '';
        room.rankings.forEach((p, i) => {
            const funding = ((p.funding || 0)*100).toFixed(1);
            rankHtml += `<div class="rank-card">
                <strong>${p.name}</strong> - ${p.status === 'active' ? 'Đang chơi' : (p.status==='ended'?'Kết thúc':'Chưa tham gia')}<br>
                💰 Funding: ${funding}% &nbsp; 📈 Hype: ${p.hype||50} &nbsp; 🔍 Trans: ${p.transparency||50}
                </div>`;
        });
        document.getElementById('rankings').innerHTML = rankHtml || '--';
    }

    async function startDeckPhase() {
        const res = await fetch(`${API}/start_deck_phase`, {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ room_id: currentRoom })
        });
        const data = await res.json();
        if (data.error) alert(data.error);
        else fetchRoom();
    }

    async function runPhase() {
        const res = await fetch(`${API}/run_phase`, {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ room_id: currentRoom })
        });
        const data = await res.json();
        if (data.error) alert(data.error);
        else fetchRoom();
    }

    async function endGame() {
        if (!confirm('Kết thúc game ngay?')) return;
        // Backend chưa có API end game riêng, ta có thể force bằng cách gửi yêu cầu reset? Tạm thời báo
        alert('Chức năng đang hoàn thiện, hãy reload trang để tạo phòng mới.');
    }

    function startPolling() {
        if (pollInterval) clearInterval(pollInterval);
        fetchRoom();
        pollInterval = setInterval(fetchRoom, 3000);
    }

    const saved = sessionStorage.getItem('roomId');
    if (saved) {
        currentRoom = saved;
        document.getElementById('setupPanel').style.display = 'none';
        document.getElementById('gamePanel').style.display = 'block';
        startPolling();
        // Lấy lại join links? Có thể fetch từ backend nhưng backend không trả. User sẽ tự copy lúc tạo.
        window.joinLinks = []; // để tránh lỗi
    }
</script>
</body>
</html>
