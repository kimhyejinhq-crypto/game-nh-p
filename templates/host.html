<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Startup Game · Teacher Host Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #fce4ec 0%, #e1d5e7 50%, #c5d9f0 100%);
            color: #1e1b2b;
            padding: 20px; 
            min-height: 100vh;
        }
        .container { max-width: 1280px; margin: 0 auto; }
        .panel { 
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            padding: 20px; 
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.15);
        }
        button { 
            background: linear-gradient(95deg, #f48fb1, #ba6bff, #5e9bff);
            color: white; 
            border: none; 
            padding: 10px 24px; 
            border-radius: 40px; 
            cursor: pointer; 
            font-size: 16px;
            font-weight: 600;
            margin-top: 10px;
            transition: all 0.25s;
        }
        button:hover { 
            background: linear-gradient(95deg, #ff80ab, #c47eff, #7eaeff);
            transform: scale(0.98);
        }
        button:disabled { opacity: 0.55; cursor: not-allowed; }
        input, select { 
            background: rgba(255,255,255,0.95);
            border: 1px solid #c9b1e6;
            padding: 8px 12px; 
            border-radius: 12px; 
            margin: 0 5px;
        }
        .flex { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .rankings { display: grid; gap: 14px; margin-top: 15px; }
        .rank-card { background: rgba(255,255,255,0.85); border-radius: 1.2rem; padding: 14px; border-left: 4px solid #ec4899; }
        .player-card-joined { background: rgba(34,197,94,0.12); border-left-color: #22c55e; }
        .player-card-not-joined { background: #ffffffdd; border-left-color: #94a3b8; }
        .player-funding { font-size: 18px; font-weight: 700; color: #f59e0b; }
        .funding-bar { width: 100%; height: 10px; background: #e2d4f0; border-radius: 999px; overflow: hidden; margin: 4px 0; }
        .funding-bar-fill { height: 100%; background: linear-gradient(90deg, #facc15, #f59e0b); transition: width 0.2s; }
        .logs { background: rgba(0,0,0,0.06); border-radius: 1rem; padding: 14px; max-height: 300px; overflow-y: auto; font-family: monospace; font-size: 13px; margin-top: 15px; }
        .loading-placeholder { background: rgba(236,72,153,0.1); border-radius: 16px; padding: 12px; text-align: center; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
        .section-panel { background: rgba(255,255,255,0.7); border-radius: 1.2rem; padding: 20px; margin-bottom: 20px; }
        .room-selector { background: rgba(255,255,240,0.8); border-radius: 40px; padding: 8px 16px; display: inline-flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .join-status-tag { display: inline-flex; padding: 4px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
        .join-status-tag.joined { background: #16a34a; color: white; }
        .join-status-tag.waiting { background: #cbd5e1; color: #1e293b; }
        .metric-tag { display: inline-flex; gap: 6px; padding: 6px 10px; border-radius: 999px; font-size: 13px; font-weight: 600; background: #f3e5ff; }
        .floating-switch { position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
    </style>
</head>
<body>
<div class="container">
    <div class="panel">
        <h2>✨ Fun(d) raising - Teacher Host Dashboard ✨</h2>
        <div class="loading-placeholder" id="connectionStatus">🔌 Đang kết nối...</div>
    </div>

    <!-- Tạo phòng ban đầu -->
    <div class="panel" id="setupPanel">
        <h2>🎮 Create New Room</h2>
        <div class="flex">
            <label>🏷️ Room name:</label>
            <input type="text" id="roomName" placeholder="e.g. Startup F2025" value="Startup Arena">
            <label>👥 Players:</label>
            <input type="number" id="numPlayers" min="2" max="10" value="4">
            <button onclick="createRoom()">🚀 CREATE ROOM</button>
        </div>
        <div style="margin-top:12px; font-size:13px;">⚡ Sau khi tạo, mỗi người chơi có link riêng.</div>
    </div>

    <!-- Main dashboard -->
    <div class="panel" id="gamePanel" style="display:none;">
        <div class="flex" style="justify-content: space-between;">
            <h2>🏠 <span id="roomNameDisplay">---</span> · ID: <span id="roomId">---</span></h2>
            <div class="room-selector">
                <span>📋 Phòng:</span>
                <select id="roomSelector" onchange="switchRoom()"></select>
                <button onclick="showCreateRoomModal()" style="background:#10b981;">+ Tạo mới</button>
            </div>
        </div>

        <div class="section-panel">
            <h3>🔗 Player Join Links</h3>
            <div id="joinLinksList" style="display:flex; flex-direction:column; gap:12px;"></div>
        </div>

        <div class="section-panel">
            <h3>⏱️ Game Progress</h3>
            <div class="flex" style="justify-content: space-between;">
                <span>👥 <strong><span id="playerCount">0</span> / <span id="maxPlayers">0</span></strong> joined</span>
                <span>🕒 Phase: <strong><span id="currentPhase">-</span> / <span id="maxPhase">-</span></strong></span>
                <span>🎯 Status: <strong id="gameStatus">-</strong></span>
            </div>
            <div class="flex" style="margin-top:15px;">
                <label>📜 Phase archive:</label>
                <select id="phaseSelect" onchange="showPhaseDetail()"></select>
            </div>
            <div id="phaseDetailBox" class="panel" style="background:rgba(245,240,255,0.5); margin-top:12px; padding:12px;"></div>
        </div>

        <div class="section-panel">
            <h3>📜 Event Log</h3>
            <div id="logsArea" class="logs"></div>
        </div>

        <div class="section-panel">
            <h3>🏆 Leaderboard</h3>
            <div id="rankings" class="rankings"></div>
        </div>

        <div class="flex">
            <button onclick="forceStartDeckPhase()" id="forceStartDeckBtn" disabled>🎲 FORCE START DECK SELECTION</button>
            <button onclick="runPhase()" id="runPhaseBtn" disabled>▶ RUN NEXT PHASE</button>
            <button onclick="endGame()" id="endGameBtn" disabled>⛔ END GAME</button>
            <button onclick="resetGame()" id="resetGameBtn" disabled>🔄 RESET GAME</button>
        </div>
    </div>
</div>

<div class="floating-switch">
    <button onclick="openPlayerView()">👤 Switch to Player View</button>
</div>

<!-- Modal tạo phòng nhanh -->
<div id="quickRoomModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); backdrop-filter:blur(4px); align-items:center; justify-content:center; z-index:1000;">
    <div style="background:white; border-radius:32px; padding:24px; max-width:500px;">
        <h3>➕ Tạo phòng mới</h3>
        <input type="text" id="newRoomName" placeholder="Tên phòng" style="width:100%; margin:12px 0;" value="Startup Game">
        <input type="number" id="newRoomPlayers" min="2" max="10" value="4" style="width:100%; margin-bottom:20px;">
        <div class="flex" style="justify-content: flex-end;">
            <button onclick="closeRoomModal()" style="background:#94a3b8;">Hủy</button>
            <button onclick="createAdditionalRoom()" style="background:#10b981;">Tạo</button>
        </div>
    </div>
</div>

<script>
    const API_BASE = window.location.origin + '/api';
    let currentRoomId = null;
    let pollingInterval = null;
    let hostRooms = [];     // lưu {id, name, maxPlayers}

    // Load danh sách phòng từ sessionStorage
    function loadRooms() {
        const saved = sessionStorage.getItem('hostRooms');
        if (saved) hostRooms = JSON.parse(saved);
        updateRoomSelector();
    }
    function saveRooms() { sessionStorage.setItem('hostRooms', JSON.stringify(hostRooms)); }
    function updateRoomSelector() {
        const sel = document.getElementById('roomSelector');
        if (!sel) return;
        sel.innerHTML = '<option value="">-- Chọn phòng --</option>';
        hostRooms.forEach(r => {
            sel.innerHTML += `<option value="${r.id}" ${currentRoomId === r.id ? 'selected' : ''}>🏠 ${r.name} (${r.id})</option>`;
        });
    }

    async function createRoom(isAdditional = false, nameOverride = null, playersOverride = null) {
        const roomName = nameOverride || document.getElementById('roomName').value.trim() || 'Startup Game';
        const maxPlayers = playersOverride || parseInt(document.getElementById('numPlayers').value, 10);
        if (maxPlayers < 2 || maxPlayers > 10) { alert('Số người chơi từ 2 đến 10'); return; }

        try {
            const res = await fetch(`${API_BASE}/rooms`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: roomName, maxPlayers: maxPlayers })
            });
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const data = await res.json();
            const newRoom = { id: data.id, name: data.name, maxPlayers: data.maxPlayers };
            hostRooms.push(newRoom);
            saveRooms();

            if (!isAdditional) {
                currentRoomId = data.id;
                sessionStorage.setItem('currentRoomId', currentRoomId);
                document.getElementById('setupPanel').style.display = 'none';
                document.getElementById('gamePanel').style.display = 'block';
                document.getElementById('roomId').innerText = currentRoomId;
                document.getElementById('roomNameDisplay').innerText = roomName;
                document.getElementById('maxPlayers').innerText = maxPlayers;
                startPolling();
                alert(`✅ Phòng "${roomName}" tạo thành công!`);
            } else {
                updateRoomSelector();
                currentRoomId = data.id;
                sessionStorage.setItem('currentRoomId', currentRoomId);
                document.getElementById('roomId').innerText = currentRoomId;
                document.getElementById('roomNameDisplay').innerText = roomName;
                document.getElementById('maxPlayers').innerText = maxPlayers;
                if (pollingInterval) clearInterval(pollingInterval);
                startPolling();
                alert(`✅ Đã tạo thêm phòng "${roomName}". Đang chuyển sang phòng mới.`);
            }
            updateRoomSelector();
        } catch (err) {
            alert(`❌ Lỗi tạo phòng: ${err.message}`);
        }
    }

    function showCreateRoomModal() {
        document.getElementById('quickRoomModal').style.display = 'flex';
        document.getElementById('newRoomName').value = 'Startup Game ' + (hostRooms.length+1);
        document.getElementById('newRoomPlayers').value = 4;
    }
    function closeRoomModal() { document.getElementById('quickRoomModal').style.display = 'none'; }
    async function createAdditionalRoom() {
        const name = document.getElementById('newRoomName').value.trim() || 'Startup Game';
        const players = parseInt(document.getElementById('newRoomPlayers').value, 10);
        closeRoomModal();
        await createRoom(true, name, players);
    }

    function switchRoom() {
        const newId = document.getElementById('roomSelector').value;
        if (!newId || newId === currentRoomId) return;
        currentRoomId = newId;
        sessionStorage.setItem('currentRoomId', currentRoomId);
        const room = hostRooms.find(r => r.id === currentRoomId);
        if (room) {
            document.getElementById('roomNameDisplay').innerText = room.name;
            document.getElementById('maxPlayers').innerText = room.maxPlayers;
        }
        document.getElementById('roomId').innerText = currentRoomId;
        if (pollingInterval) clearInterval(pollingInterval);
        startPolling();
    }

    async function fetchRoomData() {
        if (!currentRoomId) return null;
        try {
            const res = await fetch(`${API_BASE}/rooms/${currentRoomId}`);
            if (!res.ok) return null;
            return await res.json();
        } catch(e) { return null; }
    }

    function startPolling() {
        if (pollingInterval) clearInterval(pollingInterval);
        fetchAndRender();
        pollingInterval = setInterval(fetchAndRender, 2000);
    }

    async function fetchAndRender() {
        const data = await fetchRoomData();
        if (data) renderDashboard(data);
    }

    function renderDashboard(room) {
        document.getElementById('playerCount').innerText = room.joinedPlayers || 0;
        document.getElementById('currentPhase').innerText = room.currentPhase ?? 0;
        document.getElementById('maxPhase').innerText = room.maxPhase ?? 7;
        const statusSpan = document.getElementById('gameStatus');
        if (room.ended) statusSpan.innerHTML = '🏁 ENDED';
        else if (room.status === 'playing') statusSpan.innerHTML = '🔥 IN PROGRESS';
        else if (room.status === 'choosing_deck') statusSpan.innerHTML = '📦 CHOOSING DECKS';
        else statusSpan.innerHTML = '⏳ WAITING';

        const canStartDeck = room.can_start_deck === true;
        document.getElementById('forceStartDeckBtn').disabled = room.status !== 'waiting_for_projects' || !canStartDeck;
        document.getElementById('runPhaseBtn').disabled = room.status !== 'playing' || room.ended;
        document.getElementById('endGameBtn').disabled = room.ended;
        document.getElementById('resetGameBtn').disabled = false;

        // Rankings
        const rankingsDiv = document.getElementById('rankings');
        if (room.players && room.players.length) {
            const sorted = [...room.players].sort((a,b) => (b.score||0)-(a.score||0));
            rankingsDiv.innerHTML = sorted.map((p, idx) => {
                const fundingPercent = (p.funding*100).toFixed(1);
                const cardClass = p.status === 'active' ? 'player-card-joined' : 'player-card-not-joined';
                return `<div class="rank-card ${cardClass}">
                    <h3>${idx+1}. ${p.name} <span class="join-status-tag ${p.status==='active'?'joined':'waiting'}">${p.status==='active'?'Active':'Not joined'}</span></h3>
                    <div class="player-funding">💰 Funding: ${fundingPercent}%</div>
                    <div class="funding-bar"><div class="funding-bar-fill" style="width:${fundingPercent}%"></div></div>
                    <div class="flex" style="gap:8px; margin-top:8px;">
                        <span class="metric-tag">📈 Hype ${p.hype}</span>
                        <span class="metric-tag">🔍 Trans ${p.transparency}</span>
                        <span class="metric-tag">🏅 Score ${(p.score||0).toFixed(2)}</span>
                    </div>
                </div>`;
            }).join('');
        } else rankingsDiv.innerHTML = '<div class="loading-placeholder">Chưa có người chơi</div>';

        // Logs
        const logsDiv = document.getElementById('logsArea');
        if (room.logs && room.logs.length) logsDiv.innerHTML = [...room.logs].reverse().map(l => `📌 ${l}`).join('<br>');
        else logsDiv.innerHTML = '<div class="loading-placeholder">Chưa có log</div>';

        // Join links
        const linksDiv = document.getElementById('joinLinksList');
        if (room.joinLinks && room.joinLinks.length) {
            linksDiv.innerHTML = room.joinLinks.map(link => {
                const player = room.players?.find(p => p.id === link.playerIndex);
                const isJoined = player && player.status !== 'not_joined';
                return `<div style="background:rgba(255,255,255,0.85); border-radius:16px; padding:12px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;">
                    <span style="font-weight:800;">${link.playerName}</span>
                    <span class="join-status-tag ${isJoined ? 'joined' : 'waiting'}">${isJoined ? '✅ Joined' : '⌛ Waiting'}</span>
                    <input type="text" value="${link.realLink}" style="width:260px; font-size:12px;" readonly>
                    <button onclick="copyToClipboard('${link.realLink}')">Copy</button>
                </div>`;
            }).join('');
        } else linksDiv.innerHTML = '<div class="loading-placeholder">Chưa có link</div>';

        // Phase details
        const phaseSelect = document.getElementById('phaseSelect');
        if (room.phaseDetails && room.phaseDetails.length) {
            phaseSelect.innerHTML = room.phaseDetails.map(d => `<option value="${d.phase}">🏁 Phase ${d.phase} (${d.date||''})</option>`).join('');
            if (room.phaseDetails.length) showPhaseDetail();
        } else phaseSelect.innerHTML = '<option>-- Chưa có phase --</option>';
    }

    async function showPhaseDetail() {
        const room = await fetchRoomData();
        if (!room || !room.phaseDetails) return;
        const phaseNum = parseInt(document.getElementById('phaseSelect').value, 10);
        const detail = room.phaseDetails.find(d => d.phase === phaseNum);
        const container = document.getElementById('phaseDetailBox');
        if (!detail) { container.innerHTML = '<div class="loading-placeholder">Chọn phase để xem</div>'; return; }
        let playersHtml = '';
        if (detail.players) {
            playersHtml = detail.players.map(p => `<div style="display:flex; justify-content:space-between; background:rgba(245,240,255,0.7); padding:8px; border-radius:12px; margin-top:6px;">
                <strong>${p.name}</strong> <span>💰 ${(p.funding*100).toFixed(0)}% | 📈 ${p.hype} | 🏅 ${(p.score||0).toFixed(2)}</span>
            </div>`).join('');
        }
        container.innerHTML = `<div><strong>📌 PHASE ${detail.phase}</strong> - ${detail.date||''}</div>
            <div><em>${detail.event||'Không có mô tả'}</em></div>
            <div style="margin-top:10px;">${playersHtml}</div>`;
    }

    async function forceStartDeckPhase() {
        if (!currentRoomId) return;
        if (!confirm('Force bắt đầu giai đoạn chọn Deck? (Cần ít nhất 2 dự án)')) return;
        try {
            const res = await fetch(`${API_BASE}/start_deck_phase`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ room_id: currentRoomId })
            });
            if (!res.ok) throw new Error(await res.text());
            alert('✅ Đã chuyển sang giai đoạn chọn Deck!');
            await fetchAndRender();
        } catch(err) { alert(`❌ Lỗi: ${err.message}`); }
    }

    async function runPhase() {
        if (!currentRoomId) return;
        try {
            const res = await fetch(`${API_BASE}/run_phase`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ room_id: currentRoomId })
            });
            if (!res.ok) throw new Error(await res.text());
            await fetchAndRender();
        } catch(err) { alert(`❌ Lỗi: ${err.message}`); }
    }

    async function endGame() {
        if (!currentRoomId) return;
        if (!confirm('Kết thúc game ngay?')) return;
        try {
            await fetch(`${API_BASE}/rooms/${currentRoomId}/end`, { method: 'POST' });
            await fetchAndRender();
        } catch(err) { alert(`❌ Lỗi: ${err.message}`); }
    }

    async function resetGame() {
        if (!currentRoomId) return;
        if (!confirm('RESET toàn bộ game?')) return;
        try {
            await fetch(`${API_BASE}/rooms/${currentRoomId}/reset`, { method: 'POST' });
            await fetchAndRender();
        } catch(err) { alert(`❌ Lỗi: ${err.message}`); }
    }

    function copyToClipboard(text) { navigator.clipboard.writeText(text); alert('✅ Copied!'); }
    function openPlayerView() { if (currentRoomId) window.open(`/play/${currentRoomId}/0`, '_blank'); else alert('Chưa có phòng'); }

    // Khởi tạo
    loadRooms();
    const savedId = sessionStorage.getItem('currentRoomId');
    if (savedId && hostRooms.some(r => r.id === savedId)) {
        currentRoomId = savedId;
        document.getElementById('setupPanel').style.display = 'none';
        document.getElementById('gamePanel').style.display = 'block';
        const room = hostRooms.find(r => r.id === currentRoomId);
        if (room) {
            document.getElementById('roomNameDisplay').innerText = room.name;
            document.getElementById('maxPlayers').innerText = room.maxPlayers;
        }
        document.getElementById('roomId').innerText = currentRoomId;
        startPolling();
        updateRoomSelector();
    }

    window.createRoom = createRoom;
    window.switchRoom = switchRoom;
    window.showCreateRoomModal = showCreateRoomModal;
    window.createAdditionalRoom = createAdditionalRoom;
    window.closeRoomModal = closeRoomModal;
    window.forceStartDeckPhase = forceStartDeckPhase;
    window.runPhase = runPhase;
    window.endGame = endGame;
    window.resetGame = resetGame;
    window.copyToClipboard = copyToClipboard;
    window.openPlayerView = openPlayerView;
    window.showPhaseDetail = showPhaseDetail;
</script>
</body>
</html>
