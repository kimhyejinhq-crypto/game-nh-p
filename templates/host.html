<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startup Game - Host Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #fce4ec, #e1d5e7, #c5d9f0);
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .card {
            background: rgba(255,255,255,0.92);
            backdrop-filter: blur(8px);
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15);
        }
        button {
            background: linear-gradient(95deg, #f48fb1, #ba6bff, #5e9bff);
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { transform: scale(0.98); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        input, select { padding: 8px 12px; border-radius: 12px; border: 1px solid #c9b1e6; margin: 0 5px; }
        .link-item { background: rgba(255,255,255,0.7); padding: 12px; border-radius: 16px; margin-bottom: 8px; }
        .logs { background: rgba(0,0,0,0.05); border-radius: 1rem; padding: 12px; max-height: 250px; overflow-y: auto; font-family: monospace; font-size: 13px; }
        .flex { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
        .rank-card { background: white; border-radius: 1rem; padding: 12px; margin-bottom: 8px; border-left: 4px solid #ec4899; }
        .progress-bar { background: #e2e8f0; border-radius: 10px; height: 8px; overflow: hidden; margin-top: 4px; }
        .progress-fill { background: linear-gradient(90deg, #facc15, #f59e0b); height: 100%; border-radius: 10px; }
        .color-hotpink { color: #f43f5e; }
        .color-babyblue { color: #0ea5e9; }
        .color-yellow { color: #eab308; }
        .color-purple { color: #a855f7; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h2>✨ Startup Game - Host Dashboard</h2>
        <div id="connStatus">🔌 Đang kết nối...</div>
    </div>

    <div class="card" id="setupPanel">
        <h2>🎮 Create Room</h2>
        <div class="flex">
            <label>Room name (optional):</label>
            <input type="text" id="roomName" placeholder="Startup Arena" value="Startup Arena">
            <label>Players:</label>
            <input type="number" id="numPlayers" min="2" max="10" value="4">
            <button onclick="createRoom()">🚀 CREATE ROOM</button>
        </div>
    </div>

    <div class="card" id="gamePanel" style="display:none;">
        <div class="flex" style="justify-content: space-between;">
            <h2>🏠 <span id="roomNameDisplay"></span> · ID: <span id="roomId"></span></h2>
            <button onclick="location.reload()">➕ New Room</button>
        </div>

        <div class="card">
            <h3>🔗 Player Links (Copy gửi từng người)</h3>
            <div id="joinLinks"></div>
            <button id="startDeckBtn" onclick="startDeckPhase()" class="mt-3" style="background: #10b981;">▶ START DECK SELECTION</button>
        </div>

        <div class="card">
            <h3>⏱️ Progress</h3>
            <div class="flex">
                <span>👥 <strong id="joinedCount">0</strong>/<span id="totalPlayers">0</span></span>
                <span>🕒 Phase <strong id="currentPhase">0</strong>/<strong id="maxPhase">0</strong></span>
                <span>🎯 Status: <strong id="gameStatus">-</strong></span>
            </div>
            <div class="flex" style="margin-top: 12px;">
                <button onclick="nextPhase()" id="nextPhaseBtn" disabled>▶ NEXT PHASE</button>
                <button onclick="addRandomEvent()" id="randEventBtn" disabled>🎲 RANDOM EVENT</button>
                <button onclick="resetPhase()" id="resetPhaseBtn" disabled>🔄 RESET PHASE</button>
                <button onclick="endGame()" id="endGameBtn" disabled>⛔ END GAME</button>
                <button onclick="resetGame()" id="resetGameBtn">🔄 RESET GAME</button>
            </div>
        </div>

        <div class="card">
            <h3>📜 Event Log</h3>
            <div id="logs" class="logs">--</div>
        </div>

        <div class="card">
            <h3>🏆 Leaderboard</h3>
            <div id="rankings">--</div>
        </div>
    </div>
</div>

<script>
    const API = window.location.origin + '/api';
    let currentRoom = null;
    let pollInterval = null;

    async function createRoom() {
        const name = document.getElementById('roomName').value;
        const maxPlayers = parseInt(document.getElementById('numPlayers').value);
        const res = await fetch(`${API}/create_room`, {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({room_name: name, num_players: maxPlayers})
        });
        const data = await res.json();
        if (data.error) { alert(data.error); return; }
        currentRoom = data.room_id;
        sessionStorage.setItem('roomId', currentRoom);
        document.getElementById('setupPanel').style.display = 'none';
        document.getElementById('gamePanel').style.display = 'block';
        document.getElementById('roomId').innerText = currentRoom;
        document.getElementById('roomNameDisplay').innerText = name;
        document.getElementById('totalPlayers').innerText = maxPlayers;
        startPolling();
    }

    async function fetchRoom() {
        if (!currentRoom) return;
        const res = await fetch(`${API}/host_state?room_id=${currentRoom}`);
        if (!res.ok) return;
        const data = await res.json();
        updateUI(data);
    }

    function updateUI(room) {
        document.getElementById('joinedCount').innerText = room.submitted_count || 0;
        document.getElementById('currentPhase').innerText = room.phase;
        document.getElementById('maxPhase').innerText = room.max_phase;
        let statusText = '';
        if (room.game_ended) statusText = '🏁 ENDED';
        else if (room.status === 'waiting_for_projects') statusText = '⏳ Waiting for projects';
        else if (room.status === 'choosing_deck') statusText = '🃏 Choosing decks';
        else statusText = '🔥 IN PROGRESS';
        document.getElementById('gameStatus').innerText = statusText;

        const isPlaying = (room.status === 'playing' && !room.game_ended);
        document.getElementById('nextPhaseBtn').disabled = !isPlaying;
        document.getElementById('randEventBtn').disabled = !isPlaying;
        document.getElementById('resetPhaseBtn').disabled = !isPlaying;
        document.getElementById('endGameBtn').disabled = room.game_ended;

        // Join links (tạo từ frontend vì API chỉ trả về join_links khi tạo phòng)
        // Ở đây ta lưu links từ lúc tạo phòng, nhưng vì không lưu lại nên cần fetch lại? Thực tế nên lưu trong biến.
        // Giải pháp: lưu links vào session khi tạo phòng.
        if (!window.joinLinksSaved && room.join_links) {
            window.joinLinksSaved = room.join_links;
        }
        if (window.joinLinksSaved) {
            let linksHtml = '';
            window.joinLinksSaved.forEach((link, idx) => {
                const playerStatus = (room.rankings[idx] && room.rankings[idx].status !== 'not_joined') ? '✅ Joined' : '⏳ Waiting';
                linksHtml += `
                    <div class="link-item">
                        <strong>Player ${idx+1}</strong> ${playerStatus}<br>
                        <input type="text" value="${link}" style="width: 70%; font-size:12px;" readonly>
                        <button onclick="copyToClipboard('${link}')">Copy</button>
                    </div>
                `;
            });
            document.getElementById('joinLinks').innerHTML = linksHtml;
        }

        // Logs
        if (room.logs && room.logs.length) {
            document.getElementById('logs').innerHTML = room.logs.slice().reverse().map(l => `📌 ${l}`).join('<br>');
        } else {
            document.getElementById('logs').innerHTML = '--';
        }

        // Rankings
        let rankHtml = '';
        room.rankings.forEach((p, i) => {
            const funding = ((p.funding || 0)*100).toFixed(1);
            rankHtml += `
                <div class="rank-card">
                    <strong>${p.name}</strong> - ${p.status === 'active' ? '🎮 Playing' : (p.status==='ended'?'🏁 Done':(p.status==='not_joined'?'⌛ Waiting':'??'))}<br>
                    💰 Funding: ${funding}% &nbsp; 📈 Hype: ${p.hype||0} &nbsp; 🔍 Trans: ${p.transparency||0}
                </div>
            `;
        });
        document.getElementById('rankings').innerHTML = rankHtml || '--';
    }

    async function startDeckPhase() {
        const res = await fetch(`${API}/start_deck_phase`, {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({room_id: currentRoom})
        });
        const data = await res.json();
        if (data.error) alert(data.error);
        else fetchRoom();
    }

    async function nextPhase() {
        const res = await fetch(`${API}/run_phase`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({room_id: currentRoom})});
        if (!res.ok) alert('Cannot advance phase');
        else fetchRoom();
    }
    async function addRandomEvent() {
        // Không có API random event riêng, có thể dùng run_phase hoặc tạo event fake
        alert('Tính năng đang phát triển');
    }
    async function resetPhase() {
        alert('Reset phase chưa được hỗ trợ trong backend');
    }
    async function endGame() {
        if (confirm('End game now?')) {
            // Chưa có API end game riêng, có thể set game_ended = true qua run_phase? Tạm thời báo
            alert('Chưa có API kết thúc game, hãy dùng RESET GAME');
        }
    }
    async function resetGame() {
        if (confirm('Reset all data? This will delete the room.')) {
            sessionStorage.removeItem('roomId');
            location.reload();
        }
    }
    function copyToClipboard(text) {
        navigator.clipboard.writeText(text);
        alert('Copied!');
    }

    function startPolling() {
        if (pollInterval) clearInterval(pollInterval);
        fetchRoom();
        pollInterval = setInterval(fetchRoom, 2500);
    }

    const saved = sessionStorage.getItem('roomId');
    if (saved) {
        currentRoom = saved;
        document.getElementById('setupPanel').style.display = 'none';
        document.getElementById('gamePanel').style.display = 'block';
        startPolling();
        // Khôi phục join links? Có thể fetch lại từ API? API không trả join links sau khi tạo.
        // Tạm thời bỏ qua, user sẽ tự copy link từ lúc tạo.
    }
</script>
</body>
</html>
